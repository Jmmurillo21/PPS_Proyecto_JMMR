<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-center">Iniciar Sesión</h1>
        
        <form action="#" method="POST" class="space-y-4">
            <!-- Correo -->
            <div>
                <label for="email" class="block text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password" class="block text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Botón Login -->
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition-colors">
                Iniciar Sesión
            </button>
        </form>

        <!-- Enlaces adicionales -->
        <div class="mt-4 text-center space-x-4">
            <a href="registro.html" class="text-blue-500 hover:underline">Registrarse</a>
        </div>
    </div>
</body>
</html>

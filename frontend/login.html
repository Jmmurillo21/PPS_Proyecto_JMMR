<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login PPS</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
<h1 class="text-3xl font-bold mb-6 text-center">Iniciar Sesión</h1>

<form id="loginForm" class="space-y-4">

<!-- Email -->
<div>
    <label class="block text-gray-700 mb-1">Correo electrónico</label>
    <input id="email" type="email" placeholder="ejemplo@correo.com"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    <p id="error-email" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Contraseña -->
<div>
    <label class="block text-gray-700 mb-1">Contraseña</label>
    <input id="password" type="password" placeholder="Ingresa tu contraseña"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    <p id="error-password" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Botón -->
<button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition-colors">
Iniciar Sesión
</button>

</form>

<p class="mt-4 text-center text-gray-600">
¿No tienes cuenta? 
<a href="registro.html" class="text-blue-500 hover:underline">Registrarse</a>
</p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    // Limpiar errores y estilos
    ['email','password'].forEach(id=>{
        const input = document.getElementById(id);
        const p = document.getElementById('error-'+id);
        input.classList.remove('border-red-500','border-green-500');
        p.textContent = '';
        p.classList.add('hidden');
    });

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("http://localhost:5001/api/login",{
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if(response.ok){
            // Login OK → pintar inputs de verde
            ['email','password'].forEach(id=>{
                document.getElementById(id).classList.add('border-green-500');
            });

            // Guardar token
            localStorage.setItem("token", result.token);

            // Redirigir según rol
            if(result.role === 'admin'){
                window.location.href = "admin.html";
            } else {
                window.location.href = "user.html";
            }

        } else {
            // Mostrar errores debajo de cada input
            if(result.detalle){
                result.detalle.forEach(err=>{
                    if(err.toLowerCase().includes("email")){
                        document.getElementById("email").classList.add('border-red-500');
                        const p = document.getElementById("error-email");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                    if(err.toLowerCase().includes("contraseña") || err.toLowerCase().includes("password")){
                        document.getElementById("password").classList.add('border-red-500');
                        const p = document.getElementById("error-password");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                });
            } else if(result.error){
                // Mensaje general si credenciales inválidas
                alert(result.error);
                ['email','password'].forEach(id=>{
                    document.getElementById(id).classList.add('border-red-500');
                });
            }
        }

    } catch(error){
        console.error(error);
        alert("No se pudo conectar con el servidor");
    }
});
</script>

</body>
</html>

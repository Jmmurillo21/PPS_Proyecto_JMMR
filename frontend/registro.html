<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
<h1 class="text-3xl font-bold mb-6 text-center">Crear Cuenta</h1>

<form id="registroForm" class="space-y-4">

<!-- Nombre -->
<div>
    <label class="block text-gray-700 mb-1">Nombre completo</label>
    <input id="name" type="text" placeholder="Ingresa tu nombre"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
    <p id="error-name" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Email -->
<div>
    <label class="block text-gray-700 mb-1">Correo electrónico</label>
    <input id="email" type="email" placeholder="ejemplo@correo.com"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
    <p id="error-email" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Teléfono -->
<div>
    <label class="block text-gray-700 mb-1">Número de teléfono</label>
    <input id="phone" type="tel" placeholder="123456789"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
    <p id="error-phone" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Contraseña -->
<div>
    <label class="block text-gray-700 mb-1">Contraseña</label>
    <input id="password" type="password" placeholder="Ingresa tu contraseña"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
    <p id="error-password" class="text-red-500 text-sm mt-1 hidden"></p>
</div>

<!-- Botón -->
<button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition-colors">
Registrarse
</button>

</form>

<p class="mt-4 text-center text-gray-600">
¿Ya tienes cuenta? 
<a href="login.html" class="text-blue-500 hover:underline">Inicia sesión</a>
</p>
</div>

<script>
document.getElementById("registroForm").addEventListener("submit", async function(e){
    e.preventDefault();

    // Limpiar errores anteriores
    ['name','email','phone','password'].forEach(id=>{
        document.getElementById(id).classList.remove('border-red-500');
        const p = document.getElementById('error-'+id);
        p.textContent = '';
        p.classList.add('hidden');
    });

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("http://localhost:5001/api/register",{
            method: "POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if(response.ok){
            alert("Registro exitoso");
            localStorage.setItem("token", result.token);
            window.location.href="login.html";
        }else{
            // Mostrar errores debajo de cada input
            if(result.detalle){
                result.detalle.forEach(err=>{
                    if(err.toLowerCase().includes("nombre")){
                        document.getElementById("name").classList.add('border-red-500');
                        const p = document.getElementById("error-name");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                    if(err.toLowerCase().includes("email")){
                        document.getElementById("email").classList.add('border-red-500');
                        const p = document.getElementById("error-email");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                    if(err.toLowerCase().includes("teléfono") || err.toLowerCase().includes("telefono")){
                        document.getElementById("phone").classList.add('border-red-500');
                        const p = document.getElementById("error-phone");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                    if(err.toLowerCase().includes("contraseña") || err.toLowerCase().includes("password")){
                        document.getElementById("password").classList.add('border-red-500');
                        const p = document.getElementById("error-password");
                        p.textContent = err;
                        p.classList.remove('hidden');
                    }
                });
            } else {
                alert(result.error || "Error en el registro");
            }
        }

    } catch(error){
        console.error(error);
        alert("No se pudo conectar con el servidor");
    }
});
</script>

</body>
</html>

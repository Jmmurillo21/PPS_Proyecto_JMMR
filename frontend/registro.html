<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-center">Crear Cuenta</h1>
        
        <form action="#" method="POST" class="space-y-4">
            <!-- Nombre -->
            <div>
                <label for="name" class="block text-gray-700 mb-1">Nombre completo</label>
                <input type="text" id="name" name="name" placeholder="Ingresa tu nombre"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- Correo -->
            <div>
                <label for="email" class="block text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- Teléfono -->
            <div>
                <label for="phone" class="block text-gray-700 mb-1">Número de teléfono</label>
                <input type="tel" id="phone" name="phone" placeholder="123 456 789"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password" class="block text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- Botón Registrar -->
            <button type="submit"
                    class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition-colors">
                Registrarse
            </button>
        </form>

        <p class="mt-4 text-center text-gray-600">
            ¿Ya tienes cuenta?
            <a href="login.html" class="text-blue-500 hover:underline">Inicia sesión</a>
        </p>
    </div>
</body>
</html>
